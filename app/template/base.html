{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ReCognition Flow{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'core/Icon.svg' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#45af6c',
                        'primary-dark': '#3a9a5d',
                        accent: '#d4da4f',
                        background: '#faf9f6',
                        muted: '#d3d2cb',
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-background min-h-screen">
    <nav class="bg-white shadow-sm border-b border-muted">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex items-center space-x-2">
                        <img src="{% static 'core/Logo.svg' %}" alt="ReCognition" class="h-10">
                        <span class="text-xl font-bold text-primary">Flow</span>
                    </a>
                    <a href="/devices/" class="text-gray-600 hover:text-primary">Devices</a>
                    <a href="/scan/" class="text-gray-600 hover:text-primary">Scan</a>
                    <a href="/admin/" class="text-gray-600 hover:text-primary">Admin</a>
                </div>
                <div class="flex items-center">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-gray-500 mr-4">{{ user.username }}</span>
                        <form method="post" action="{% url 'logout' %}" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-sm text-gray-500 hover:text-red-600">Logout</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
