{% extends "base.html" %}

{% block title %}Login - ReCognition Workbench{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            ReCognition Workbench
        </h1>
        
        {% if form.errors %}
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" autofocus required
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:border-primary focus:ring-primary">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:border-primary focus:ring-primary">
            </div>
            <button type="submit" 
                    class="w-full bg-primary text-white py-2 rounded hover:bg-blue-700 font-semibold">
                Log In
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
